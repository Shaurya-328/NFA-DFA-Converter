<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFA Transition Table</title>
  <link rel="shortcut icon" href="images/fevicon-logo.png" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Tool-page animation enhancements */
    .converter, .visualizer, .table-generator {
      animation: panelSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    h1 { animation: headlineDrop 0.7s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes headlineDrop {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .graph-box, #graphArea { position: relative; }
button:active { transform: scale(0.97) translateY(1px) !important; transition: transform 0.1s !important; }
    #tableArea tr:hover td, #dfaTable tr:hover td { color: var(--accent) !important; }
    /* Stagger form fields */
    .converter > *, .visualizer > *, .table-generator > * {
      animation: fieldSlideIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .converter > *:nth-child(1),.visualizer > *:nth-child(1),.table-generator > *:nth-child(1){ animation-delay:0.05s; }
    .converter > *:nth-child(2),.visualizer > *:nth-child(2),.table-generator > *:nth-child(2){ animation-delay:0.10s; }
    .converter > *:nth-child(3),.visualizer > *:nth-child(3),.table-generator > *:nth-child(3){ animation-delay:0.15s; }
    .converter > *:nth-child(4),.visualizer > *:nth-child(4),.table-generator > *:nth-child(4){ animation-delay:0.20s; }
    .converter > *:nth-child(5),.visualizer > *:nth-child(5),.table-generator > *:nth-child(5){ animation-delay:0.25s; }
    @keyframes fieldSlideIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <script src="theme.js"></script>
  <h1>NFA Transition Table</h1>
  <p class="intro4">Enter NFA details to generate its transition table.</p>

  <div class="table-generator">
    <label for="states">States</label>
    <input id="states" type="text" placeholder="e.g. q0,q1,q2">
    <label for="start">Start State</label>
    <input id="start" type="text" placeholder="e.g. q0">
    <label for="final">Final States</label>
    <input id="final" type="text" placeholder="e.g. q1,q2">
    <label for="alphabet">Alphabet</label>
    <input id="alphabet" type="text" placeholder="e.g. a,b">
    <label for="transitions">Transitions <span style="font-size:11px;color:#475569;font-family:monospace;">(q0,a=q1)</span></label>
    <textarea id="transitions" placeholder="q0,a=q1&#10;q0,a=q2&#10;q1,b=q2"></textarea>
    <button id="generateNfaTable">Generate Table</button>
  </div>

  <div class="section-label"><h2>Transition Table</h2></div>
  <div id="tableArea"><p>NFA table will appear here</p></div>

  <div class="export-bar">
    <button class="export-btn" onclick="exportTableCSV('tableArea','nfa-table')"><span class="eicon">📥</span> Export CSV</button>
  </div>

  <button onclick="(function(){document.body.style.transition='opacity 0.3s ease';document.body.style.opacity='0';setTimeout(function(){location.href='homepage.html';},300);})()">← Back to Home</button>
  <script src="script.js"></script>
  <script src="interactions.js"></script>
<script src="animations.js"></script>
</body>
</html>
